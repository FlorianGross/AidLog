<!doctype html>
<html lang="de" class="h-full">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Theme color is also injected by the PWA manifest; kept here for the
         initial paint before JS/SW boot. Value mirrors src/lib/branding.ts. -->
    <meta name="theme-color" content="#0f766e" />
    <meta name="color-scheme" content="dark light" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="h-full">
    <div style="display: contents" class="h-full">%sveltekit.body%</div>
  </body>
</html>
