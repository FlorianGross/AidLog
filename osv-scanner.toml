# OSV-Scanner configuration — Aidlog.
#
# OSV-Scanner reads pnpm-lock.yaml and reports known vulnerabilities from the
# OSV database. Use [[IgnoredVulns]] to accept a specific advisory with a reason
# and (optionally) an expiry, so the gate stays meaningful instead of being
# globally muted.
#
# Each entry MUST carry a reason; prefer adding an `ignoreUntil` so acceptances
# are revisited rather than forgotten.

# Example (keep commented until actually needed):
#
# [[IgnoredVulns]]
# id = "GHSA-xxxx-xxxx-xxxx"
# # transitive dev-only dep, not reachable at runtime; tracked in issue #NN
# reason = "dev-only, not in the production deploy tree"
# ignoreUntil = 2026-09-01

[[IgnoredVulns]]
id = "GHSA-gv7w-rqvm-qjhr"
# esbuild "missing binary integrity verification IN DENO" — not applicable: we
# install with Node + pnpm (integrity enforced via the lockfile + registry
# hashes), never Deno. esbuild is also a DEV-only transitive dep (vite, vitest,
# tsx, drizzle-kit) and is excluded from the production deploy tree
# (`pnpm deploy --prod`). The patched esbuild (>=0.28.1) is not yet required by
# any of those parents, so a forced override would risk breaking vite's build.
reason = "Deno-specific (we use Node/pnpm); dev-only transitive, not in the production deploy tree"
ignoreUntil = 2026-12-15

[[IgnoredVulns]]
id = "GHSA-fx2h-pf6j-xcff"
# vite `server.fs.deny` bypass on Windows alternate paths — affects only the
# vite DEV/preview server's file-serving guard. CI runs `vite build` (no server)
# and production serves static files via Caddy (vite never runs). It reaches the
# tree only through vitest's dev tooling. The patch is vite >=6.4.3, but the app
# is pinned to vite ^5 for @sveltejs/vite-plugin-svelte 4 + libsodium build
# compatibility (vite 6/8 mangle the emscripten bundle — see the vite-8 revert).
# Revisit when migrating to vite 6 + vite-plugin-svelte 5.
reason = "vite dev-server-only; not in CI/prod attack surface; patch (vite 6.4.3) breaks the pinned vite-5 toolchain"
ignoreUntil = 2026-12-15
